<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isometric Roguelite-RPG</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050811;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            color: #e0e6ed;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* HUD Главного экрана */
        .hud-overlay {
            position: absolute;
            z-index: 5;
            pointer-events: none;
            padding: 15px;
        }

        .hud-top-left {
            top: 10px;
            left: 10px;
            background: rgba(13, 22, 36, 0.85);
            border: 2px solid #1f375c;
            border-radius: 6px;
            pointer-events: auto;
        }

        .hud-top-right {
            top: 10px;
            right: 10px;
            background: rgba(13, 22, 36, 0.85);
            border: 2px solid #1f375c;
            border-radius: 6px;
            pointer-events: auto;
            text-align: right;
        }

        .hud-value {
            font-weight: bold;
            color: #00ffcc;
        }

        /* Логи игрового процесса */
        #game-log {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 280px;
            height: 150px;
            background: rgba(5, 8, 17, 0.85);
            border: 1px solid #1f375c;
            border-radius: 6px;
            padding: 10px;
            font-size: 11px;
            color: #a0aec0;
            overflow-y: auto;
            z-index: 5;
            pointer-events: auto;
        }

        /* Виртуальный D-Pad */
        .d-pad {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5;
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 55px);
            gap: 5px;
            pointer-events: auto;
        }

        .pad-btn {
            background: rgba(13, 22, 36, 0.9);
            border: 2px solid #1f375c;
            border-radius: 8px;
            color: #e0e6ed;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .pad-btn:active {
            background: #1f375c;
        }

        /* Экран Боя */
        #combat-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background-color: rgba(5, 8, 17, 0.92);
            display: none;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        #combat-overlay.active {
            display: flex;
        }

        .combat-fighters {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .fighter-pane {
            background: #0d1624;
            border: 2px solid #1f375c;
            border-radius: 8px;
            padding: 15px;
            width: 45%;
            box-sizing: border-box;
        }

        .fighter-pane.monster {
            border-color: #7a1d1d;
        }

        .fighter-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px dashed #1f375c;
            padding-bottom: 5px;
        }

        .stat-line {
            margin: 5px 0;
            font-size: 14px;
        }

        /* Карточная рука */
        .combat-hand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        #cards-hand {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #111a2e;
            border: 2px solid #284473;
            border-radius: 6px;
            padding: 10px;
            width: 140px;
            height: 160px;
            color: #e0e6ed;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 11px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card-name {
            font-weight: bold;
            color: #00ffcc;
            text-align: center;
            border-bottom: 1px solid #1f375c;
            padding-bottom: 4px;
        }

        .card-desc {
            font-style: italic;
            color: #cbd5e1;
            margin: 10px 0;
            text-align: center;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }

        .card-btn {
            flex: 1;
            padding: 5px;
            font-size: 10px;
            background: #1c2d42;
            border: 1px solid #334e68;
            color: #fff;
            border-radius: 3px;
            cursor: pointer;
        }

        .card-btn:hover {
            background: #2b4566;
        }

        #combat-actions {
            text-align: center;
            margin: 15px 0;
        }

        .btn-action {
            background: #a82424;
            border: 2px solid #e12d2d;
            border-radius: 6px;
            color: #fff;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(168, 36, 36, 0.4);
        }

        .btn-action:active {
            background: #e12d2d;
        }

        #combat-logs {
            background: rgba(13, 22, 36, 0.85);
            border: 1px solid #1f375c;
            border-radius: 6px;
            height: 100px;
            overflow-y: auto;
            padding: 8px;
            font-size: 12px;
            color: #94a3b8;
        }

        input, button {
            pointer-events: auto;
        }

        @media (max-width: 600px) {
            .fighter-pane {
                padding: 8px;
            }
            .fighter-name {
                font-size: 14px;
            }
            .stat-line {
                font-size: 11px;
            }
            .card {
                width: 105px;
                height: 130px;
                font-size: 9px;
            }
            .card-btn {
                padding: 3px;
                font-size: 8px;
            }
            .btn-action {
                padding: 8px 15px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Исследование HUD -->
    <div class="hud-overlay hud-top-left">
        <div>HP: <span id="p-hp" class="hud-value">0</span></div>
        <div>PA (Физ. броня): <span id="p-pa" class="hud-value">0</span></div>
        <div>MA (Маг. броня): <span id="p-ma" class="hud-value">0</span></div>
        <div>Уровень: <span id="hud-level" class="hud-value">1</span></div>
    </div>

    <div class="hud-overlay hud-top-right">
        <div>
            Сид: <input type="text" id="seed-input" value="roguelike_seed" style="width: 100px; background: #070e17; color: #fff; border: 1px solid #1f375c; padding: 2px;">
            <button id="regen-btn" style="background: #1f375c; color: #fff; border: none; padding: 3px 8px; cursor: pointer;">Генерация</button>
        </div>
    </div>

    <div id="game-log"></div>

    <div class="d-pad">
        <div></div>
        <div class="pad-btn" id="pad-up">▲</div>
        <div></div>
        <div class="pad-btn" id="pad-left">◀</div>
        <div class="pad-btn" id="pad-down">▼</div>
        <div class="pad-btn" id="pad-right">▶</div>
        <div></div>
        <div></div>
        <div></div>
    </div>

    <!-- Боевой интерфейс -->
    <div id="combat-overlay">
        <div class="combat-fighters">
            <!-- Игрок -->
            <div class="fighter-pane">
                <div class="fighter-name">Герой</div>
                <div class="stat-line">Здоровье: <span id="combat-p-hp" class="hud-value">0</span></div>
                <div class="stat-line">Физ. броня (PA): <span id="combat-p-pa" class="hud-value">0</span></div>
                <div class="stat-line">Маг. броня (MA): <span id="combat-p-ma" class="hud-value">0</span></div>
                <div class="stat-line">Сила (Кубы): <span id="combat-p-fight" class="hud-value">0</span></div>
            </div>

            <!-- Противник -->
            <div class="fighter-pane monster">
                <div class="fighter-name" id="combat-m-name">Монстр</div>
                <div class="stat-line">Здоровье: <span id="combat-m-hp" class="hud-value">0</span></div>
                <div class="stat-line">Физ. броня (PA): <span id="combat-m-pa" class="hud-value">0</span></div>
                <div class="stat-line">Маг. броня (MA): <span id="combat-m-ma" class="hud-value">0</span></div>
            </div>
        </div>

        <div class="combat-hand-container">
            <div id="burn-status" style="font-size: 12px; color: #f43f5e; font-weight: bold;"></div>
            <div id="cards-hand"></div>
        </div>

        <div id="combat-actions">
            <button class="btn-action" id="roll-dice-btn">Бросить кубики</button>
        </div>

        <div id="combat-logs"></div>
    </div>

    <!-- Глобальные импорты библиотек -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- Запуск игрового скрипта как модуля -->
    <script type="module" src="gameLoop.js"></script>
</body>
</html>
